server {
	listen 80;
	listen [::]:80;

  root /usr/share/nginx/html;

	# Add index.html
	index index.html;

	location / {
		try_files $uri /index.html;
	}

	# deny access to .htaccess files, if Apache's document root
	# concurs with nginx's one
	#
	location ~ /\.ht {
		deny all;
	}

	location ~ /\. {
		access_log off;
		log_not_found off;
		deny all;
	}

	access_log  /var/log/nginx/server.com.br-access.log;
	error_log   /var/log/nginx/server.com.br-error.log;
}
